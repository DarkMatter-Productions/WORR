// WORR Quake II / Quake II Rerelease AAS generation preset.
//
// Task IDs: FR-04-T11, FR-04-T16, DV-07-T06
//
// The hull values mirror WORR player movement in:
// - src/game/sgame/player/p_move.cpp
// - src/game/bgame/game.hpp
//
// Keep this file close to stock Q2 player physics until per-map validation
// proves a tighter value is needed.

#define PRESENCE_NONE               1
#define PRESENCE_NORMAL             2
#define PRESENCE_CROUCH             4

// WORR/Q2 standing player hull: 32x32x56.
bbox
{
	presencetype	PRESENCE_NORMAL
	flags			0x0000
	mins			{-16, -16, -24}
	maxs			{16, 16, 32}
}

// WORR/Q2 crouched player hull: 32x32x28. Crouch is ground-oriented in WORR.
bbox
{
	presencetype	PRESENCE_CROUCH
	flags			0x0001
	mins			{-16, -16, -24}
	maxs			{16, 16, 4}
}

settings
{
	phys_gravitydirection		{0, 0, -1}
	phys_friction				6
	phys_stopspeed				100
	phys_gravity				800
	phys_waterfriction			1
	phys_watergravity			400
	phys_maxvelocity			300
	phys_maxwalkvelocity		300
	phys_maxcrouchvelocity		100
	phys_maxswimvelocity		400
	phys_walkaccelerate			10
	phys_airaccelerate			10
	phys_swimaccelerate			10
	phys_maxstep				18
	phys_maxsteepness			0.7
	phys_maxwaterjump			18
	phys_maxbarrier				33
	phys_jumpvel				270
	phys_falldelta5				40
	phys_falldelta10			60
	rs_waterjump				400
	rs_teleport					50
	rs_barrierjump				100
	rs_startcrouch				300
	rs_startgrapple				500
	rs_startwalkoffledge		70
	rs_startjump				300
	rs_rocketjump				500
	rs_bfgjump					500
	rs_jumppad					250
	rs_aircontrolledjumppad		300
	rs_funcbob					300
	rs_startelevator			50
	rs_falldamage5				300
	rs_falldamage10				500
	rs_maxfallheight			0
	rs_maxjumpfallheight		450
}
