set r_dof 0
exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set r_fullbright 1
set r_glowmaps 0
set gl_bloom 0
set vk_bloom 0
set gl_md5_load 0
set vk_md5_load 0
set gl_md5_use 0
set vk_md5_use 0
// One-pixel raster is the portable intersection of the OpenGL and Vulkan
// line-width ranges on the validation adapter; wider artistic settings remain
// available through each renderer's cvar outside this deterministic gate.
set gl_celshading 1
set vk_celshading 1
map worr_fr01_model_glowmap
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_model_celshading
wait 10
quit
