set r_dof 0
exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set r_fullbright 1
set r_glowmaps 0
set r_glowmap_intensity 1
set gl_glowmap_intensity 1
set r_crtmode 0
set gl_bloom 0
set vk_bloom 0
map worr_fr01_model_shell
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
set gl_gpu_timers 1
set gl_profile_log 2
set vk_stats_log 2
wait 240
set gl_profile_log 0
set vk_stats_log 0
quit
