exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set gl_showtris 0
set vk_showtris 0
set cl_draw2d 1
set cl_alpha 1
set crosshair 3
set cl_crosshair_color 25
set cl_crosshair_brightness 1
set cl_crosshair_size 32
set cl_crosshair_health 0
set cl_crosshair_hit_style 0
set cl_crosshair_pulse 0
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_showtris_ui_baseline
wait 2
set gl_showtris 4
set vk_showtris 4
wait 10
screenshottga fr01_showtris_ui_overlay
wait 2
vk_stats
wait 10
quit
