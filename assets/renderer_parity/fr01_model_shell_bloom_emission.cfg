set r_glowmap_intensity 1
set gl_glowmap_intensity 1
set r_dof 0
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_bloom 1
set vk_bloom 1
set gl_bloom_iterations 1
set vk_bloom_iterations 1
set gl_bloom_downscale 4
set vk_bloom_downscale 4
set gl_bloom_firefly 10
set vk_bloom_firefly 10
set gl_bloom_sigma 8
set vk_bloom_sigma 8
set gl_bloom_threshold 100
set vk_bloom_threshold 100
set gl_bloom_knee 0
set vk_bloom_knee 0
set gl_bloom_intensity 1
set vk_bloom_intensity 1
set gl_bloom_saturation 1
set vk_bloom_saturation 1
