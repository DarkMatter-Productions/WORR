exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set r_fullbright 1
set r_dof 0
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_shaders 1
set vk_shaders 1
set gl_warp_refraction 0
set vk_warp_refraction 0
set gl_draworder 0.5
set vk_draworder 0.5
set fixedtime 16
map worr_fr01_liquid_entity_ordering
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
pause
wait 10
screenshottga fr01_liquid_entity_ordering_unrefracted
wait 10
set fixedtime 0
quit
