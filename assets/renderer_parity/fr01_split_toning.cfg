exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set gl_bloom 0
set vk_bloom 0
set r_dof 0
set r_crtmode 0
set gl_hdr 0
set vk_hdr 0
set gl_color_correction 0
set vk_color_correction 0
set gl_color_lut ""
set vk_color_lut ""
set gl_color_split_shadows "#402060"
set vk_color_split_shadows "#402060"
set gl_color_split_highlights "#ffd080"
set vk_color_split_highlights "#ffd080"
set gl_color_split_strength 0.85
set vk_color_split_strength 0.85
set gl_color_split_balance -0.10
set vk_color_split_balance -0.10
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_split_toning
wait 10
quit
