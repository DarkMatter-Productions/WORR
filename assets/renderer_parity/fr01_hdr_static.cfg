exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set gl_bloom 0
set vk_bloom 0
set r_dof 0
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_color_split_strength 0
set vk_color_split_strength 0
set gl_color_lut ""
set vk_color_lut ""
set gl_hdr 1
set vk_hdr 1
set gl_hdr_exposure 1.35
set vk_hdr_exposure 1.35
set gl_hdr_white 1.15
set vk_hdr_white 1.15
set gl_hdr_gamma 2.2
set vk_hdr_gamma 2.2
set gl_hdr_auto_exposure 0
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_hdr_static
wait 10
quit
