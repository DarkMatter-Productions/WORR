exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set r_fullbright 1
set gl_gpulerp 0
set r_glowmaps 0
set r_dof 0
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_warp_refraction 0
set vk_warp_refraction 0
set gl_bloom 1
set vk_bloom 1
set gl_bloom_iterations 1
set vk_bloom_iterations 1
set gl_bloom_downscale 4
set vk_bloom_downscale 4
set gl_bloom_firefly 10
set vk_bloom_firefly 10
set gl_bloom_sigma 8
set vk_bloom_sigma 8
set gl_bloom_threshold 100
set vk_bloom_threshold 100
set gl_bloom_knee 0
set vk_bloom_knee 0
set gl_bloom_intensity 1
set vk_bloom_intensity 1
set gl_bloom_saturation 1
set vk_bloom_saturation 1
set gl_bloom_scene_saturation 1
set vk_bloom_scene_saturation 1
set gl_hdr 1
set vk_hdr 1
set gl_hdr_exposure 1.35
set vk_hdr_exposure 1.35
set gl_hdr_white 1.15
set vk_hdr_white 1.15
set gl_hdr_gamma 2.2
set vk_hdr_gamma 2.2
set gl_hdr_auto_exposure 0
set cl_gun 1
set cl_thirdperson 0
set cl_player_rimlight_team 0
set fixedtime 16
map worr_fr01_viewweapon_shell_bloom_refraction
wait 60
set gl_warp_refraction 0.1
set vk_warp_refraction 0.1
wait 10
forcemenuoff
closeconsole
wait 20
pause
wait 10
screenshottga fr01_hdr_viewweapon_shell_bloom_refraction
wait 10
set fixedtime 0
quit
