exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set gl_bloom 0
set vk_bloom 0
set r_dof 0
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_color_split_strength 0
set vk_color_split_strength 0
set gl_color_lut ""
set vk_color_lut ""
set gl_hdr 0
set vk_hdr 0
// The launch starts fixed at one-half, so Vulkan creates a scaled offscreen
// scene. Switch to a stable adaptive target before the first map frame: the
// renderer must refresh that scene target to 1.0 without recreating output.
set r_resolutionscale 2
set r_resolutionscale_gooddrawtime 1000
set r_resolutionscale_targetdrawtime 1000
set r_resolutionscale_numframesbeforeraising 10000
set r_resolutionscale_numframesbeforelowering 10000
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_resolution_scale_offscreen_retirement
wait 10
quit
